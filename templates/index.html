<!DOCTYPE html>
<html lang="en">
<head>
    <title>NLP Assistant</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", sans-serif;
            background: #e3e3e4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 380px;
            height: 650px;
            background: #9dabb6;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0,0,0,0.18);
        }

        /* ── Header ── */
        .chat-header {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 18px 16px;
            text-align: center;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: 0.3px;
        }

        .chat-header p {
            font-size: 12px;
            margin-top: 4px;
            color: #b0bec5;
            font-weight: 400;
        }

        /* ── Chat Box ── */
        .chat-box {
            flex: 1;
            padding: 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #bdc4c9;
        }

        /* ── Messages ── */
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user {
            background: #1565c0;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: #f1f3f4;
            color: #222;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* ── Typing Indicator ── */
        .typing {
            background: #e0e0e0;
            color: #555;
            align-self: flex-start;
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            padding: 10px 16px;
            font-size: 20px;
            letter-spacing: 4px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Suggestions ── */
        .suggestions-wrapper {
            align-self: flex-start;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 100%;
            margin-top: 2px;
        }

        .suggestion-chip {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .suggestion-chip:hover {
            background: #1565c0;
            color: white;
            transform: scale(1.03);
        }

        /* ── Input Area ── */
        .input-area {
            display: flex;
            padding: 12px;
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
            gap: 8px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
            background: white;
            transition: border 0.2s;
        }

        .input-area input:focus {
            border-color: #1565c0;
        }

        .input-area button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #1565c0;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        .input-area button:hover {
            background: #0d47a1;
            transform: scale(1.05);
        }

        .input-area button:disabled {
            background: #90caf9;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>
<div class="chat-container">

    <div class="chat-header">
        🤖 NLP Assistant
        <p>Your guide to Natural Language Processing</p>
    </div>

    <div id="chatbox" class="chat-box">
        <!-- greeting loads here automatically -->
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" />
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
    const chatbox = document.getElementById("chatbox");
    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    // ── Use a suggestion chip ──
    function useSuggestion(chip) {
        input.value = chip.innerText;
        sendMessage();
    }

    // ── Append a message bubble ──
    function appendMessage(text, role) {
        const div = document.createElement("div");
        div.classList.add("message", role);
        div.innerText = text;
        chatbox.appendChild(div);
        scrollDown();
        return div;
    }

    // ── Append suggestion chips ──
    function appendSuggestions(suggestions) {
        if (!suggestions || suggestions.length === 0) return;

        const wrapper = document.createElement("div");
        wrapper.classList.add("suggestions-wrapper");

        suggestions.forEach(s => {
            const chip = document.createElement("span");
            chip.classList.add("suggestion-chip");
            chip.innerText = s;
            chip.onclick = () => useSuggestion(chip);
            wrapper.appendChild(chip);
        });

        chatbox.appendChild(wrapper);
        scrollDown();
    }

    // ── Show / remove typing indicator ──
    function showTyping() {
        const div = document.createElement("div");
        div.classList.add("typing");
        div.id = "typing-indicator";
        div.innerText = "...";
        chatbox.appendChild(div);
        scrollDown();
    }

    function removeTyping() {
        const t = document.getElementById("typing-indicator");
        if (t) t.remove();
    }

    function scrollDown() {
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // ── Main send function ──
    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        // Disable input while waiting
        input.value = "";
        sendBtn.disabled = true;
        input.disabled = true;

        appendMessage(message, "user");
        showTyping();

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            if (!res.ok) throw new Error(`Server error: ${res.status}`);

            const data = await res.json();

            removeTyping();
            appendMessage(data.reply, "bot");
            appendSuggestions(data.suggestions);

        } catch (err) {
            removeTyping();
            appendMessage("⚠️ Could not connect to the server. Make sure Flask is running.", "bot");
            console.error("Fetch error:", err);
        }

        // Re-enable input
        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
    }

    // ── Enter key support ──
    input.addEventListener("keypress", function (e) {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
