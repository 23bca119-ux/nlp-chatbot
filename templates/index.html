<!DOCTYPE html>
<html>
<head>
    <title>NLP Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #e8e3dc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 360px;
            height: 620px;
            background: #ffffff;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }

        .chat-header {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 16px;
            text-align: center;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 12px;
            margin-top: 5px;
            color: #cfd8dc;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 12px;
            font-size: 14px;
        }

        .user {
            background: #1976d2;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #f1f3f4;
            color: #222;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 12px;
            background: #f5f5f5;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        .input-area button {
            margin-left: 10px;
            padding: 10px 14px;
            border-radius: 50%;
            border: none;
            background: #1565c0;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        🤖 NLP Assistant
        <p>Your guide to Natural Language Processing</p>
    </div>

    <div id="chatbox" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value;

    if (input.trim() === "") return;

    let chatbox = document.getElementById("chatbox");

    // User message
    let userMsg = document.createElement("div");
    userMsg.classList.add("message", "user");
    userMsg.innerText = input;
    chatbox.appendChild(userMsg);

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: input })
    })
    .then(res => res.json())
    .then(data => {
        let botMsg = document.createElement("div");
        botMsg.classList.add("message", "bot");

        botMsg.innerText = data.reply;

        chatbox.appendChild(botMsg);
        chatbox.scrollTop = chatbox.scrollHeight;
    });

    document.getElementById("userInput").value = "";
}

// Enter key support
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
